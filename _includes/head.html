<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- OGP 基本タグ -->
  <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | escape }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title | escape }}">

  <!-- OGP 画像（thumbnail が設定されている記事のみ） -->
  {%- if page.thumbnail %}
  <meta property="og:image" content="{{ page.thumbnail | absolute_url }}">
  {%- endif %}

  <!-- Jekyll SEO Tag（_config.yml で有効な場合） -->
  {%- seo -%}

  <!-- スタイルシート -->
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">

  <!-- RSS フィード -->
  {%- feed_meta -%}

  <!-- Google Analytics（本番環境かつ設定済みの場合のみ） -->
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

</head>
