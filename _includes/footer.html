<footer class="site-footer h-card">
  <div class="wrapper">

    <div style="text-align: center; padding: 16px 0;">
      <a href="{{ "/" | relative_url }}">
        <img
          src="{{ "/assets/images/logo.png" | relative_url }}"
          alt="{{ site.title }}"
          height="150px"
        >
      </a>
    </div>

    <div style="text-align: center; font-size: 0.85rem; color: #888; padding-bottom: 12px;">
      &copy; {{ site.time | date: "%Y" }} {{ site.title | escape }}
    </div>

  </div>
</footer>
